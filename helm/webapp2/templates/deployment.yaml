apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webapp2.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: webapp2
  template:
    metadata:
      labels:
        app: webapp2
    spec:
      serviceAccountName: {{ include "webapp2.fullname" . }}
      containers:
        - name: webapp2
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: WEBAPP1_BASE_URL
              value: {{ .Values.env.WEBAPP1_BASE_URL | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
