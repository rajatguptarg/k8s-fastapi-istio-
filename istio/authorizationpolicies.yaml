apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: webapp1-authz
  namespace: webapp1
spec:
  selector:
    matchLabels:
      app: webapp1
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/webapp2/sa/webapp2"
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/api/v1/users*", "/health"]
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway"
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/", "/api/v1/users*", "/health"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: webapp2-authz
  namespace: webapp2
spec:
  selector:
    matchLabels:
      app: webapp2
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/webapp1/sa/webapp1"
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/api/v1/items*", "/health"]
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway"
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/", "/api/v1/items*", "/health"]
