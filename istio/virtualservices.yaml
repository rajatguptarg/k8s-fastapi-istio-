apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: webapp1-vs
  namespace: webapp1
spec:
  hosts:
    - "*"
  gateways:
    - istio-system/apps-gateway
  http:
    - match:
        - uri:
            prefix: /webapp1
      rewrite:
        uri: /
      route:
        - destination:
            host: webapp1.webapp1.svc.cluster.local
            port:
              number: 80
---
